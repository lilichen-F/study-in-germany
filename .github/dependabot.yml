version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: [ "react*", "@types/react*" ]
      vite:
        patterns: [ "vite*", "@vitejs/*" ]
      supabase:
        patterns: [ "@supabase/*" ]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
